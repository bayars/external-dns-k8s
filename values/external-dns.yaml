# Common values shared by all environments.
# Environment-specific overrides live in values/external-dns-{env}.yaml.

provider:
  name: google

# Watch LoadBalancer Services across all namespaces
sources:
  - service

# Safety net — external-dns only touches records under these domains
domainFilters:
  - safabayar.net

# sync: upsert + delete orphaned records when Services are removed
# upsert-only: never delete (safer for shared zones)
policy: sync

# Reconciliation frequency
interval: 1m

logLevel: info
logFormat: json

# ClusterRole + ClusterRoleBinding to watch all namespaces
rbac:
  create: true

serviceAccount:
  create: true
  name: external-dns

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
